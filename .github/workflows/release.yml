name: Publish Extension

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v2
              with:
                  fetch-depth: 0

            - name: Use Node.js 20.x
              uses: actions/setup-node@v2
              with:
                  node-version: 20.x

            - run: npm install

            - name: Generate Changelog
              id: cliff
              uses: orhun/git-cliff-action@v4
              with:
                  args: --latest --strip all

            - name: Get version
              id: meta
              run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: Stack trace analyzer ${{ github.ref_name }}
                  body: |
                      ${{ steps.cliff.outputs.content }}

                      [VSCode Marketplace](https://marketplace.visualstudio.com/items?itemName=tihonove.stack-trace-analyzer) | [Open VSX Registry](https://open-vsx.org/extension/tihonove/stack-trace-analyzer) | [Direct download](https://marketplace.visualstudio.com/_apis/public/gallery/publishers/tihonove/vsextensions/stack-trace-analyzer/${{ steps.meta.outputs.version }}/vspackage)

            - name: Install vsce
              run: npm install -g @vscode/vsce

            - name: Install ovsx
              run: npm install -g ovsx

            - name: Package Extension
              run: vsce package --no-git-tag-version

            - name: Publish to VS Marketplace
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: vsce publish --no-git-tag-version --packagePath *.vsix

            - name: Publish to Open VSX Registry
              env:
                  OVSX_PAT: ${{ secrets.OVSX_PAT }}
              run: ovsx publish *.vsix
